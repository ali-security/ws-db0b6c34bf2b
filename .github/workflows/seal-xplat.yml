name: Seal Cross-Platform Tests

on:
  push:
  workflow_dispatch:

permissions: {}

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - x64
        node:
          - 10
          - 12
          - 14
          - 16
          - 18
          - 20
          - 22
          - 24
          - 25
        os:
          - macOS-latest
          - ubuntu-latest
          - windows-latest
        include:
          - arch: x86
            node: 10
            os: windows-latest
          - arch: x86
            node: 12
            os: windows-latest
          - arch: x86
            node: 14
            os: windows-latest
          - arch: x86
            node: 16
            os: windows-latest
          - arch: x86
            node: 20
            os: windows-latest
          - arch: x86
            node: 22
            os: windows-latest
        exclude:
          # macOS-latest runners are arm64, and Node <16 ships no arm64-darwin
          # build; keep node 10/12/14 covered on ubuntu/windows x64 instead.
          - os: macOS-latest
            node: 10
          - os: macOS-latest
            node: 12
          - os: macOS-latest
            node: 14
    steps:
      - name: Configure npm time machine registry
        run: npm config set registry https://:2026-01-05T20%3A28%3A13.823000Z@time-machines-npm.sealsecurity.io/
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          architecture: ${{ matrix.arch }}
          cache: npm
          cache-dependency-path: ./package.json
      - run: npm install
      - run: npm run lint
        if:
          matrix.os == 'ubuntu-latest' && matrix.node == 22 && matrix.arch ==
          'x64'
      - run: npm test
